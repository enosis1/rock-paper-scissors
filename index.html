<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<link rel="stylesheet" href="styles.css">
	<script src="script.js" defer></script>
</head>

<body>
	<div class="header">
		<div class="header-text">Rock Paper Scissors</div>
	</div>
	<div class="content">
		<div class="content-text">
			Can you beat the computer?
		</div>
		<div class="buttons">
			<button class="button-rock">Rock</button>
			<button class="button-paper">Paper</button>
			<button class="button-scissors">Scissors</button>
		</div>
		<div class="text">
			<div class="text-results">What will you choose?</div>
			<div class="text-score">Player Score: 0. Computer Score: 0.</div>
		</div>
	</div>
	<div class="footer">
		<div class="footer-text">
			Made by Mike :)
		</div>
	</div>

</body>

</html>
